  <g filter="url(#glow)" opacity="0.85">
    <text x="200" y="222" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700" text-anchor="middle" fill="url(#txt)">Render</text>
  </g>
  <text x="200" y="222" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700" text-anchor="middle" fill="url(#txt)">Render</text>
