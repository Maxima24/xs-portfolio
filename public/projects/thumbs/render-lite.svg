      <stop offset="0" stop-color="#00f0ff" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#7af9ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#7af9ff"/>
