<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff00e5"/>
      <stop offset="1" stop-color="#00f0ff"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#ff00e5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff00e5" stop-opacity="0"/>
    </radialGradient>
